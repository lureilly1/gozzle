name: Publish Canary

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@gozzle"

      - name: Install dependencies
        run: npm ci

      - name: Set canary version
        run: npm version "0.0.1-canary.${GITHUB_RUN_NUMBER}" --no-git-tag-version -w @gozzle/cli

      - name: Build
        run: npm run build -w @gozzle/cli

      - name: Test
        run: npm test -w @gozzle/cli

      - name: Publish canary
        run: npm publish -w @gozzle/cli --tag canary --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SECRET_KEY }}
